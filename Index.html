<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Precision Image Splitter | Advanced Logic</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        .preview-canvas { max-width: 100%; height: auto; border: 2px dashed #cbd5e1; }
        footer { position: fixed; bottom: 0; width: 100%; background: #1e293b; color: white; text-align: center; padding: 10px 0; font-weight: 500; }
        body { padding-bottom: 60px; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans">

    <nav class="bg-white shadow-sm p-4 mb-8">
        <div class="max-w-5xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold text-indigo-600">ProSplitter <span class="text-slate-400 font-light">v1.0</span></h1>
        </div>
    </nav>

    <main class="max-w-5xl mx-auto p-4 grid grid-cols-1 md:grid-cols-3 gap-8">
        
        <div class="bg-white p-6 rounded-xl shadow-md border border-slate-200 h-fit">
            <h2 class="text-lg font-semibold mb-4">Settings</h2>
            
            <div class="mb-6">
                <label class="block text-sm font-medium mb-2">Upload Image</label>
                <input type="file" id="imageInput" accept="image/*" class="w-full text-sm text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-indigo-50 file:text-indigo-700 hover:file:bg-indigo-100">
            </div>

            <div class="mb-4">
                <label class="block text-sm font-medium mb-2">Split Mode</label>
                <select id="splitMode" class="w-full p-2 border rounded-md bg-slate-50">
                    <option value="grid">Grid (Rows/Cols)</option>
                    <option value="dimensions">Physical Dimensions</option>
                </select>
            </div>

            <div id="gridControls" class="space-y-4">
                <div class="grid grid-cols-2 gap-2">
                    <div>
                        <label class="text-xs font-bold uppercase text-slate-500">Rows</label>
                        <input type="number" id="rows" value="2" min="1" class="w-full p-2 border rounded-md">
                    </div>
                    <div>
                        <label class="text-xs font-bold uppercase text-slate-500">Columns</label>
                        <input type="number" id="cols" value="2" min="1" class="w-full p-2 border rounded-md">
                    </div>
                </div>
            </div>

            <div id="dimControls" class="hidden space-y-4">
                <div class="grid grid-cols-2 gap-2">
                    <div>
                        <label class="text-xs font-bold uppercase text-slate-500">Width</label>
                        <input type="number" id="targetWidth" value="21" step="0.1" class="w-full p-2 border rounded-md">
                    </div>
                    <div>
                        <label class="text-xs font-bold uppercase text-slate-500">Height</label>
                        <input type="number" id="targetHeight" value="29.7" step="0.1" class="w-full p-2 border rounded-md">
                    </div>
                </div>
                <div>
                    <label class="text-xs font-bold uppercase text-slate-500">Unit</label>
                    <select id="unit" class="w-full p-2 border rounded-md">
                        <option value="cm">Centimeters (cm)</option>
                        <option value="in">Inches (in)</option>
                        <option value="m">Meters (m)</option>
                    </select>
                </div>
                <p class="text-[10px] text-slate-400 italic">Tip: A4 is 21 x 29.7 cm</p>
            </div>

            <button id="processBtn" class="w-full mt-8 bg-indigo-600 text-white py-3 rounded-lg font-bold hover:bg-indigo-700 transition shadow-lg shadow-indigo-200">
                Split & Download (ZIP)
            </button>
        </div>

        <div class="md:col-span-2">
            <div class="bg-white p-4 rounded-xl shadow-md border border-slate-200 min-h-[400px] flex flex-col items-center justify-center">
                <p id="placeholderText" class="text-slate-400">Preview will appear here</p>
                <canvas id="previewCanvas" class="preview-canvas hidden"></canvas>
            </div>
        </div>

    </main>

    <footer>
        Developed by Revanth Reddy Abbati
    </footer>

    <script>
        const imageInput = document.getElementById('imageInput');
        const splitMode = document.getElementById('splitMode');
        const gridControls = document.getElementById('gridControls');
        const dimControls = document.getElementById('dimControls');
        const processBtn = document.getElementById('processBtn');
        const previewCanvas = document.getElementById('previewCanvas');
        const placeholderText = document.getElementById('placeholderText');

        let originalImage = new Image();

        // Handle UI toggles
        splitMode.addEventListener('change', () => {
            if (splitMode.value === 'grid') {
                gridControls.classList.remove('hidden');
                dimControls.classList.add('hidden');
            } else {
                gridControls.classList.add('hidden');
                dimControls.classList.remove('hidden');
            }
        });

        // Handle Image Upload
        imageInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (event) => {
                originalImage.onload = () => {
                    placeholderText.classList.add('hidden');
                    previewCanvas.classList.remove('hidden');
                    drawPreview();
                };
                originalImage.src = event.target.result;
            };
            reader.readAsDataURL(file);
        });

        function drawPreview() {
            const ctx = previewCanvas.getContext('2d');
            previewCanvas.width = originalImage.width;
            previewCanvas.height = originalImage.height;
            ctx.drawImage(originalImage, 0, 0);
        }

        // Advanced Logic for Splitting
        processBtn.addEventListener('click', async () => {
            if (!originalImage.src) return alert("Please upload an image first!");

            const zip = new JSZip();
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            
            let tileWidth, tileHeight, totalRows, totalCols;

            if (splitMode.value === 'grid') {
                totalRows = parseInt(document.getElementById('rows').value);
                totalCols = parseInt(document.getElementById('cols').value);
                tileWidth = originalImage.width / totalCols;
                tileHeight = originalImage.height / totalRows;
            } else {
                // Physical dimension logic
                const unit = document.getElementById('unit').value;
                const valW = parseFloat(document.getElementById('targetWidth').value);
                const valH = parseFloat(document.getElementById('targetHeight').value);
                
                // standard 96 DPI for web conversion
                let pixelsPerUnit;
                if (unit === 'in') pixelsPerUnit = 96;
                else if (unit === 'cm') pixelsPerUnit = 96 / 2.54;
                else if (unit === 'm') pixelsPerUnit = (96 / 2.54) * 100;

                tileWidth = valW * pixelsPerUnit;
                tileHeight = valH * pixelsPerUnit;
                totalCols = Math.ceil(originalImage.width / tileWidth);
                totalRows = Math.ceil(originalImage.height / tileHeight);
            }

            processBtn.innerText = "Processing...";
            processBtn.disabled = true;

            for (let r = 0; r < totalRows; r++) {
                for (let c = 0; c < totalCols; c++) {
                    canvas.width = tileWidth;
                    canvas.height = tileHeight;
                    
                    // Clear canvas for transparency support
                    ctx.clearRect(0, 0, tileWidth, tileHeight);
                    
                    ctx.drawImage(
                        originalImage,
                        c * tileWidth, r * tileHeight, tileWidth, tileHeight, // Source
                        0, 0, tileWidth, tileHeight // Destination
                    );

                    const imgData = canvas.toDataURL('image/png').split(',')[1];
                    zip.file(`tile_${r+1}_${c+1}.png`, imgData, {base64: true});
                }
            }

            const content = await zip.generateAsync({type: "blob"});
            const link = document.createElement('a');
            link.href = URL.createObjectURL(content);
            link.download = "split_images_revanth.zip";
            link.click();

            processBtn.innerText = "Split & Download (ZIP)";
            processBtn.disabled = false;
        });
    </script>
</body>
</html>
