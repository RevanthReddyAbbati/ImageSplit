<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ImageSplitter Pro | Precision Tools</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; padding-bottom: 80px; }
        .canvas-container { position: relative; width: 100%; display: flex; justify-content: center; background: #f8fafc; border-radius: 16px; overflow: hidden; border: 1px solid #e2e8f0; }
        canvas { max-width: 100%; height: auto !important; }
        #gridCanvas { position: absolute; top: 0; left: 50%; transform: translateX(-50%); pointer-events: none; }
        footer { position: fixed; bottom: 0; left: 0; width: 100%; background: #ffffff; border-top: 1px solid #f1f5f9; color: #94a3b8; text-align: center; padding: 18px 0; z-index: 50; letter-spacing: 0.025em; }
        .input-focus:focus { ring: 2px; ring-color: #4f46e5; border-color: transparent; }
    </style>
</head>
<body class="bg-white text-slate-900">

    <header class="bg-white/80 backdrop-blur-md border-b border-slate-100 p-4 sticky top-0 z-40">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center shadow-lg shadow-indigo-200">
                    <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M4 5a1 1 0 011-1h14a1 1 0 011 1v2a1 1 0 01-1 1H5a1 1 0 01-1-1V5zM4 13a1 1 0 011-1h6a1 1 0 011 1v6a1 1 0 01-1 1H5a1 1 0 01-1-1v-6zM16 13a1 1 0 011-1h2a1 1 0 011 1v6a1 1 0 01-1 1h-2a1 1 0 01-1-1v-6z"></path></svg>
                </div>
                <h1 class="font-extrabold text-xl tracking-tight">ImageSplitter<span class="text-indigo-600 font-normal ml-0.5">Pro</span></h1>
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto p-4 lg:p-10 grid grid-cols-1 lg:grid-cols-12 gap-10">
        
        <section class="lg:col-span-5 xl:col-span-4 space-y-6">
            <div class="bg-white p-6 rounded-2xl shadow-2xl shadow-slate-200/50 border border-slate-100">
                <h2 class="text-[11px] font-black text-slate-400 uppercase tracking-[0.2em] mb-6">Control Panel</h2>
                
                <div class="mb-8">
                    <label class="block text-sm font-bold text-slate-700 mb-3">1. Select Image</label>
                    <input type="file" id="imageInput" accept="image/*" class="block w-full text-xs text-slate-400 file:mr-4 file:py-2.5 file:px-5 file:rounded-xl file:border-0 file:text-xs file:font-bold file:bg-indigo-50 file:text-indigo-600 hover:file:bg-indigo-100 transition-all cursor-pointer">
                </div>

                <div class="mb-8">
                    <label class="block text-sm font-bold text-slate-700 mb-3">2. Split Mode</label>
                    <div class="flex gap-1.5 p-1.5 bg-slate-100 rounded-2xl">
                        <button id="btnGrid" onclick="setMode('grid')" class="flex-1 py-2.5 text-[11px] font-black rounded-xl bg-white shadow-sm text-indigo-600 transition-all">GRID</button>
                        <button id="btnDim" onclick="setMode('dimensions')" class="flex-1 py-2.5 text-[11px] font-black rounded-xl text-slate-500 transition-all">DIMENSIONS</button>
                    </div>
                </div>

                <div id="controls" class="space-y-5">
                    <div id="gridInputs" class="grid grid-cols-2 gap-4">
                        <div class="space-y-2">
                            <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">Rows</label>
                            <input type="number" id="rows" value="2" min="0.1" step="0.1" class="w-full p-3.5 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500/20 transition-all font-semibold">
                        </div>
                        <div class="space-y-2">
                            <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">Columns</label>
                            <input type="number" id="cols" value="2" min="0.1" step="0.1" class="w-full p-3.5 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500/20 transition-all font-semibold">
                        </div>
                    </div>

                    <div id="dimInputs" class="hidden space-y-4">
                        <div class="grid grid-cols-2 gap-4">
                            <div class="space-y-2">
                                <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">Width</label>
                                <input type="number" id="targetWidth" value="21" step="0.1" class="w-full p-3.5 bg-slate-50 border border-slate-200 rounded-xl font-semibold">
                            </div>
                            <div class="space-y-2">
                                <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">Height</label>
                                <input type="number" id="targetHeight" value="29.7" step="0.1" class="w-full p-3.5 bg-slate-50 border border-slate-200 rounded-xl font-semibold">
                            </div>
                        </div>
                        <select id="unit" class="w-full p-3.5 bg-slate-50 border border-slate-200 rounded-xl text-sm font-bold outline-none cursor-pointer">
                            <option value="cm">Centimeters (cm)</option>
                            <option value="in">Inches (in)</option>
                            <option value="m">Meters (m)</option>
                        </select>
                    </div>
                </div>

                <div class="pt-8 border-t border-slate-100 mt-8 space-y-3">
                    <button onclick="process('zip')" id="zipBtn" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white py-4 rounded-xl font-black text-[11px] uppercase tracking-widest shadow-xl shadow-indigo-100 transition-all active:scale-[0.98]">
                        Download Images (.ZIP)
                    </button>
                    <button onclick="process('pdf')" id="pdfBtn" class="w-full bg-slate-900 hover:bg-black text-white py-4 rounded-xl font-black text-[11px] uppercase tracking-widest transition-all active:scale-[0.98]">
                        Download Print Ready (.PDF)
                    </button>
                </div>
            </div>
        </section>

        <section class="lg:col-span-7 xl:col-span-8 flex flex-col">
            <div class="bg-slate-50 border-2 border-dashed border-slate-200 rounded-[2rem] p-4 lg:p-8 flex-1 flex items-center justify-center relative min-h-[500px]">
                <div id="emptyState" class="text-center">
                    <p class="text-slate-400 font-semibold">Preview will appear here after upload</p>
                </div>

                <div id="previewWrapper" class="canvas-container hidden">
                    <canvas id="mainCanvas"></canvas>
                    <canvas id="gridCanvas"></canvas>
                </div>
            </div>
        </section>
    </main>

    <footer>
        Developed by <span class="font-extrabold text-slate-800 uppercase tracking-tighter">revanth reddy abbati</span>
    </footer>

    <script>
        const { jsPDF } = window.jspdf;
        const imageInput = document.getElementById('imageInput');
        const mainCanvas = document.getElementById('mainCanvas');
        const gridCanvas = document.getElementById('gridCanvas');
        const previewWrapper = document.getElementById('previewWrapper');
        const emptyState = document.getElementById('emptyState');

        let currentMode = 'grid';
        let originalImage = new Image();

        function setMode(mode) {
            currentMode = mode;
            document.getElementById('gridInputs').classList.toggle('hidden', mode !== 'grid');
            document.getElementById('dimInputs').classList.toggle('hidden', mode === 'grid');
            
            const isGrid = mode === 'grid';
            document.getElementById('btnGrid').className = isGrid ? "flex-1 py-2.5 text-[11px] font-black rounded-xl bg-white shadow-sm text-indigo-600 transition-all" : "flex-1 py-2.5 text-[11px] font-black rounded-xl text-slate-500 transition-all";
            document.getElementById('btnDim').className = !isGrid ? "flex-1 py-2.5 text-[11px] font-black rounded-xl bg-white shadow-sm text-indigo-600 transition-all" : "flex-1 py-2.5 text-[11px] font-black rounded-xl text-slate-500 transition-all";
            
            updateGrid();
        }

        imageInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (event) => {
                originalImage.onload = () => {
                    emptyState.classList.add('hidden');
                    previewWrapper.classList.remove('hidden');
                    initCanvases();
                };
                originalImage.src = event.target.result;
            };
            reader.readAsDataURL(file);
        });

        function initCanvases() {
            mainCanvas.width = originalImage.width;
            mainCanvas.height = originalImage.height;
            mainCanvas.getContext('2d').drawImage(originalImage, 0, 0);
            gridCanvas.width = originalImage.width;
            gridCanvas.height = originalImage.height;
            updateGrid();
        }

        function updateGrid() {
            if (!originalImage.src) return;
            const ctx = gridCanvas.getContext('2d');
            ctx.clearRect(0, 0, gridCanvas.width, gridCanvas.height);
            
            ctx.strokeStyle = "#6366f1"; 
            ctx.lineWidth = Math.max(originalImage.width / 400, 2);
            ctx.setLineDash([15, 15]);

            const { tileW, tileH, totalCols, totalRows } = calculateDimensions();

            // Draws lines based on decimal float values
            for (let i = 1; i < totalCols; i++) {
                ctx.beginPath(); ctx.moveTo(i * tileW, 0); ctx.lineTo(i * tileW, gridCanvas.height); ctx.stroke();
            }
            for (let j = 1; j < totalRows; j++) {
                ctx.beginPath(); ctx.moveTo(0, j * tileH); ctx.lineTo(gridCanvas.width, j * tileH); ctx.stroke();
            }
        }

        function calculateDimensions() {
            let tileW, tileH, totalRows, totalCols;
            if (currentMode === 'grid') {
                // FIXED: Changed parseInt to parseFloat to support decimal splits
                totalRows = parseFloat(document.getElementById('rows').value) || 1;
                totalCols = parseFloat(document.getElementById('cols').value) || 1;
                tileW = originalImage.width / totalCols;
                tileH = originalImage.height / totalRows;
            } else {
                const unit = document.getElementById('unit').value;
                const valW = parseFloat(document.getElementById('targetWidth').value) || 1;
                const valH = parseFloat(document.getElementById('targetHeight').value) || 1;
                let ppu = (unit === 'in') ? 96 : (unit === 'cm' ? 96/2.54 : (96/2.54)*100);
                tileW = valW * ppu;
                tileH = valH * ppu;
                totalCols = Math.ceil(originalImage.width / tileW);
                totalRows = Math.ceil(originalImage.height / tileH);
            }
            return { tileW, tileH, totalRows, totalCols };
        }

        async function process(type) {
            if (!originalImage.src) return alert("Please upload an image first.");
            const { tileW, tileH, totalRows, totalCols } = calculateDimensions();
            const tempCanvas = document.createElement('canvas');
            const tempCtx = tempCanvas.getContext('2d');
            
            // We use Math.ceil here because if you have 4.5 rows, you actually need 5 physical tiles
            const loopRows = Math.ceil(totalRows);
            const loopCols = Math.ceil(totalCols);

            if (type === 'zip') {
                const zip = new JSZip();
                for (let r = 0; r < loopRows; r++) {
                    for (let c = 0; c < loopCols; c++) {
                        const w = Math.min(tileW, originalImage.width - (c * tileW));
                        const h = Math.min(tileH, originalImage.height - (r * tileH));
                        if (w <= 0 || h <= 0) continue;
                        tempCanvas.width = w; tempCanvas.height = h;
                        tempCtx.drawImage(originalImage, c * tileW, r * tileH, w, h, 0, 0, w, h);
                        zip.file(`tile_${r+1}_${c+1}.png`, tempCanvas.toDataURL('image/png', 1.0).split(',')[1], {base64: true});
                    }
                }
                const content = await zip.generateAsync({type: "blob"});
                const link = document.createElement('a');
                link.href = URL.createObjectURL(content);
                link.download = "split_by_revanth.zip";
                link.click();
            } else {
                const pdf = new jsPDF({
                    orientation: tileW > tileH ? 'l' : 'p',
                    unit: 'px',
                    format: [tileW, tileH]
                });

                for (let r = 0; r < loopRows; r++) {
                    for (let c = 0; c < loopCols; c++) {
                        const w = Math.min(tileW, originalImage.width - (c * tileW));
                        const h = Math.min(tileH, originalImage.height - (r * tileH));
                        if (w <= 0 || h <= 0) continue;
                        if (r > 0 || c > 0) pdf.addPage([tileW, tileH]);
                        tempCanvas.width = w; tempCanvas.height = h;
                        tempCtx.drawImage(originalImage, c * tileW, r * tileH, w, h, 0, 0, w, h);
                        pdf.addImage(tempCanvas.toDataURL('image/png', 1.0), 'PNG', 0, 0, w, h);
                    }
                }
                pdf.save("split_by_revanth.pdf");
            }
        }

        document.querySelectorAll('input, select').forEach(el => el.addEventListener('input', updateGrid));
    </script>
</body>
</html>
